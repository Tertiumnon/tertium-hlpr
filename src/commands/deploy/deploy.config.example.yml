# Dragons Legends - Server Deployment Config
# Copy this to deploy.config.yml and customize for your environment

# Remote server SSH connection details
remoteHost: drh-mini
remoteUser: vitba

# Remote deployment path
deployPath: /var/www/dragons-legends.gm.server

# Application name (used for PM2 process name)
appName: dragons-legends.gm.server

# Local build directory to deploy
localDist: ./dist

# Environment file to copy to remote
envFile: .env

# Port for PM2 environment variable
port: 8080

# Skip dependency installation (useful for quick redeploys)
skipInstall: false

# Skip PM2 restart (useful for testing)
skipRestart: false
